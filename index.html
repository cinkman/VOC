<script>
(function() {
  var CORRECT = 'bestsub2026';
  var SESSION_KEY = 'bsf_auth';
  if (sessionStorage.getItem(SESSION_KEY) !== '1') {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.display = 'none';
    });
    var attempt = 0;
    function ask() {
      var pw = prompt(attempt === 0
        ? '🔒 BestSub Ceramic Factory\nEnter password to continue:'
        : '❌ Incorrect password. Try again:');
      if (pw === null) {
        document.write('<div style="font-family:sans-serif;text-align:center;padding:80px;color:#555"><h2>🔒 Access Denied</h2><p>Please refresh the page to try again.</p></div>');
      } else if (pw === CORRECT) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.body.style.display = '';
      } else {
        attempt++;
        if (attempt >= 3) {
          document.write('<div style="font-family:sans-serif;text-align:center;padding:80px;color:#e05c5c"><h2>🔒 Too Many Attempts</h2><p>Please refresh the page to try again.</p></div>');
        } else {
          ask();
        }
      }
    }
    window.addEventListener('DOMContentLoaded', ask);
  }
})();
</script>

      <h3 data-en="🔥 45.5m Mesh Belt Tunnel Kiln — What is it?" data-th="🔥 เตาอบอุโมงค์สายพาน 45.5 ม. — คืออะไร?"></h3>
      <p data-en="This is a very long oven (45.5 meters — about the length of 4 buses!) on a moving stainless steel mesh belt. Cups ride on the belt through different temperature zones to bake and cure the paint. Temperature is controlled to within ±1°C precision." data-th="นี่คือเตาอบที่ยาวมาก (45.5 เมตร — ยาวเท่ารถบัส 4 คัน!) บนสายพานตาข่ายสแตนเลสที่เคลื่อนที่ได้ แก้วจะวิ่งบนสายพานผ่านโซนอุณหภูมิต่างๆ เพื่ออบและบ่มสี ควบคุมอุณหภูมิได้ในความแม่นยำ ±1°C"></p>
    </div>
    <div style="font-size:12px;font-weight:600;color:#555;margin-bottom:8px;" data-en="Kiln zones — click to learn more:" data-th="โซนเตาอบ — คลิกเพื่อเรียนรู้เพิ่มเติม:"></div>
    <div class="kiln-bar">
      <div class="kiln-zone" style="background:#b0c4de;width:9%;" onclick="showKiln('level')" data-en="Levelling 4m" data-th="โซนอุ่น 4ม."></div>
      <div class="kiln-zone" style="background:#e05c5c;width:44%;" onclick="showKiln('heat')" data-en="Heating Zone 20m (10 segments)" data-th="โซนให้ความร้อน 20ม. (10 ส่วน)"></div>
      <div class="kiln-zone" style="background:#c0392b;width:9%;" onclick="showKiln('const')" data-en="Constant Temp 4m" data-th="อุณหภูมิคงที่ 4ม."></div>
      <div class="kiln-zone" style="background:#3ab5e6;width:35%;" onclick="showKiln('cool')" data-en="Cooling Zone 16m (8 segments)" data-th="โซนระบายความร้อน 16ม."></div>
      <div class="kiln-zone" style="background:#5cb85c;width:3%;" onclick="showKiln('out')" data-en="Out" data-th="ออก"></div>
    </div>
    <div id="kiln-detail" class="detail-panel" style="display:none;">
      <h4 id="kiln-title"></h4>

    </div>
    <div class="cols" style="margin-top:14px;">
      <div class="info-box" style="border-left-color:#e05c5c;">
        <h3 data-en="⚙️ Key Specs" data-th="⚙️ ข้อมูลจำเพาะหลัก"></h3>
        <ul>
          <li data-en="Total length: 45.5 m" data-th="ความยาวรวม: 45.5 ม."></li>
          <li data-en="Belt width: 0.90 m (SUS304 stainless steel)" data-th="ความกว้างสายพาน: 0.90 ม. (สแตนเลส SUS304)"></li>
          <li data-en="Max temperature: ≤300°C" data-th="อุณหภูมิสูงสุด: ≤300°C"></li>
          <li data-en="Belt speed: 1–2.5 m/min (adjustable)" data-th="ความเร็วสายพาน: 1–2.5 ม./นาที (ปรับได้)"></li>
          <li data-en="Temperature precision: ±1°C" data-th="ความแม่นยำอุณหภูมิ: ±1°C"></li>
          <li data-en="Total weight: 30 tonnes" data-th="น้ำหนักรวม: 30 ตัน"></li>
        </ul>
      </div>
      <div class="info-box" style="border-left-color:#3ab5e6;">
        <h3 data-en="💡 Why Such a Long Kiln?" data-th="💡 ทำไมต้องใช้เตาอบที่ยาวมากขนาดนี้?"></h3>
        <p data-en="The ceramic mug must be heated slowly and cooled slowly. If you heat or cool it too fast, it cracks! The long kiln gives cups enough time at each temperature zone. Think of it like baking a cake — you can't rush the oven." data-th="แก้วเซรามิกต้องถูกให้ความร้อนและระบายความร้อนอย่างช้าๆ หากเร็วเกินไปจะแตก! เตาอบที่ยาวให้เวลาเพียงพอในแต่ละโซนอุณหภูมิ เปรียบเหมือนการอบเค้ก — ห้ามรีบ"></p>
      </div>

  <!-- SPRAY -->
  <div class="section" id="spray">
    <div class="info-box">
      <h3 data-en="🎨 How Spray Painting Works" data-th="🎨 กระบวนการพ่นสีทำงานอย่างไร"></h3>
      <p data-en="The spray painting line coats ceramic cups with a uniform, durable paint layer using automated spray guns. Cups are mounted on rotating fixtures that spin while the gun moves back and forth — ensuring every surface is evenly coated." data-th="สายการพ่นสีเคลือบแก้วเซรามิกด้วยชั้นสีที่สม่ำเสมอและทนทาน โดยใช้หัวฉีดพ่นสีอัตโนมัติ แก้วถูกติดบนอุปกรณ์หมุนที่หมุนขณะที่หัวฉีดเคลื่อนไปมา เพื่อให้ทุกพื้นผิวถูกเคลือบอย่างสม่ำเสมอ"></p>
    </div>
    <div class="stage-list">
      <div class="stage-item"><div class="stage-num" style="background:#888;">1</div><div class="stage-text"><h4 data-en="Air Gun Dust Removal" data-th="ปืนลมกำจัดฝุ่น"></h4><p data-en="Before painting, a high-pressure air gun (0.6–0.8 MPa) blasts the cup surface to remove dust or metal shavings. Efficiency: ≥98%. Even a tiny speck of dust under paint creates a visible bump or defect." data-th="ก่อนพ่นสี ปืนลมแรงดันสูง (0.6–0.8 MPa) จะเป่าพื้นผิวแก้วเพื่อกำจัดฝุ่นหรือเศษโลหะ ประสิทธิภาพ: ≥98% แม้แต่เม็ดฝุ่นเล็กๆ ใต้สีก็สร้างตำหนิที่มองเห็นได้"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#3ab5e6;">2</div><div class="stage-text"><h4 data-en="Manual Loading + Cup Washing" data-th="ป้อนแก้ว + ล้างแก้ว"></h4><p data-en="Operators place cups on the conveyor. The washing machine uses purified water (from the RO system) to clean cups. Cycle: ~20 min. Then UV light sterilises the surface and strong airflow removes remaining moisture." data-th="ผู้ปฏิบัติงานวางแก้วบนสายพาน เครื่องล้างใช้น้ำบริสุทธิ์ (จากระบบ RO) ล้างแก้ว รอบ: ~20 นาที จากนั้น UV ฆ่าเชื้อบนพื้นผิว และลมแรงกำจัดความชื้นที่เหลือ"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#f5a623;">3</div><div class="stage-text"><h4 data-en="Pre-Heat (40–60°C)" data-th="อุ่นล่วงหน้า (40–60°C)"></h4><p data-en="Cups are briefly pre-heated in a hot-air oven (PID controlled, up to 100°C) for 2–5 minutes. A warm cup surface helps paint stick better — like warming a surface before applying primer." data-th="แก้วถูกอุ่นล่วงหน้าในเตาอบลมร้อน (ควบคุม PID, สูงสุด 100°C) เป็นเวลา 2–5 นาที พื้นผิวที่อุ่นช่วยให้สีติดดีขึ้น เหมือนกับการอุ่นพื้นผิวก่อนทาสีรองพื้น"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#e05c5c;">4</div><div class="stage-text"><h4 data-en="Automated Spray Painting" data-th="พ่นสีอัตโนมัติ"></h4><p data-en="A servo reciprocating machine moves the spray gun back and forth (stroke: 1.5m, speed: 0.3–0.6 m/s). Cups rotate on fixtures while being sprayed 2–3 passes. Film thickness: 15–30μm. The spray booth water curtain captures overspray to prevent air pollution." data-th="เครื่องพ่นสีแบบลูกสูบเซอร์โวเคลื่อนหัวฉีดไปมา (ระยะ: 1.5ม., ความเร็ว: 0.3–0.6 ม./วินาที) แก้วหมุนบนอุปกรณ์ขณะพ่น 2–3 รอบ ความหนาฟิล์ม: 15–30μm ม่านน้ำในบู๊ธดักจับละอองสีส่วนเกิน"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#e05c5c;">5</div><div class="stage-text"><h4 data-en="Hot Air Curing (150–180°C)" data-th="อบแห้งด้วยลมร้อน (150–180°C)"></h4><p data-en="Freshly sprayed cups pass through a hot-air tunnel oven for 8–15 minutes at 150–180°C. This chemically bonds the paint to the ceramic surface, making it hard and durable. The main ceramic line uses the 45.5m kiln instead (180°C, 1.5 hours)." data-th="แก้วที่พ่นสีสดผ่านเตาอบอุโมงค์ลมร้อน 8–15 นาทีที่ 150–180°C สิ่งนี้เชื่อมสีเข้ากับพื้นผิวเซรามิกทางเคมี ทำให้แข็งและทนทาน สายเซรามิกหลักใช้เตาอบ 45.5ม. แทน (180°C, 1.5 ชม.)"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#5cb85c;">6</div><div class="stage-text"><h4 data-en="Auto Unloading + Cooling" data-th="ขนถ่ายอัตโนมัติ + ระบายความร้อน"></h4><p data-en="Cups automatically slide off the conveyor onto a collection rack. Cooling fans bring them to room temperature before handling. Hot cups would be damaged if handled immediately." data-th="แก้วจะเลื่อนออกจากสายพานอัตโนมัติไปยังชั้นวาง พัดลมระบายความร้อนลดอุณหภูมิให้ถึงระดับห้องก่อนหยิบจับ แก้วร้อนจะเสียหายหากหยิบจับทันที"></p></div></div>
    </div>
  </div>

  <!-- AIR TREATMENT -->
  <div class="section" id="air">
    <div class="info-box">
      <h3 data-en="💨 Why Does the Air Need to be Cleaned?" data-th="💨 ทำไมอากาศต้องได้รับการบำบัด?"></h3>
      <p data-en="Spray painting releases VOCs (Volatile Organic Compounds) — toxic chemicals like toluene, xylene, and benzene from paint. These smell bad and are harmful to humans and the environment. The factory treats this air before releasing it. Target: >95% purification efficiency. Total capacity: 60,000 m³/h." data-th="การพ่นสีปล่อย VOC (สารประกอบอินทรีย์ระเหย) — สารเคมีพิษอย่างโทลูอีน ไซลีน และเบนซีนจากสี สารเหล่านี้มีกลิ่นเหม็นและเป็นอันตรายต่อมนุษย์และสิ่งแวดล้อม โรงงานบำบัดอากาศก่อนปล่อยออก เป้าหมาย: ประสิทธิภาพ >95% กำลังการผลิต: 60,000 ม.³/ชม."></p>
    </div>
    <div class="stage-list">
      <div class="stage-item"><div class="stage-num" style="background:#3ab5e6;">1</div><div class="stage-text"><h4 data-en="Cyclone Tower (Wet Pre-Treatment) 🌀" data-th="หอไซโคลน (การบำบัดเบื้องต้นแบบเปียก) 🌀"></h4><p data-en="Removes: Large dust particles, paint mist, soluble chemicals. How: Dirty air spins inside the tower like a tornado. Dust is flung to the walls, captured by water droplets, and settles to the bottom tank. Imagine a wet spinning drum where particles stick to water and fall down." data-th="กำจัด: อนุภาคฝุ่นขนาดใหญ่, ละอองสี, สารเคมีที่ละลายน้ำได้ วิธีการ: อากาศสกปรกหมุนภายในหอเหมือนพายุทอร์นาโด ฝุ่นถูกเหวี่ยงไปยังผนัง ถูกดักจับโดยหยดน้ำ และตกลงสู่ถังน้ำด้านล่าง"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#888;">2</div><div class="stage-text"><h4 data-en="Dry Filter (Secondary Filtration) 🧽" data-th="ตัวกรองแห้ง (การกรองรอบสอง) 🧽"></h4><p data-en="Removes: Fine dust, water mist, tiny residual particles. How: Air passes through multiple layers of fine filter material (glass fibre + polyester felt). Filtration precision: 1–5 micrometers. A pressure gauge monitors when the filter needs replacing." data-th="กำจัด: ฝุ่นละเอียด, ละอองน้ำ, อนุภาคเล็กที่เหลือ วิธีการ: อากาศผ่านชั้นวัสดุกรองละเอียดหลายชั้น (ใยแก้ว + ผ้าโพลีเอสเตอร์) ความแม่นยำในการกรอง: 1–5 ไมโครเมตร มาตรวัดความดันตรวจสอบเมื่อต้องเปลี่ยนไส้กรอง"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#f5a623;">3</div><div class="stage-text"><h4 data-en="Activated Carbon Adsorption/Desorption 🪨" data-th="การดูดซับ/คายซับถ่านกัมมันต์ 🪨"></h4><p data-en="Removes: VOC gas molecules (toluene, xylene, etc.). Air passes through honeycomb activated carbon beds. VOC molecules stick to the carbon (adsorption). When full, hot air (80–120°C) blows backwards to release concentrated VOCs (desorption). Concentrated gas goes to Stage 4." data-th="กำจัด: โมเลกุลก๊าซ VOC (โทลูอีน, ไซลีน ฯลฯ) อากาศผ่านชั้นถ่านกัมมันต์รังผึ้ง โมเลกุล VOC ติดกับถ่าน (การดูดซับ) เมื่อเต็ม ลมร้อน (80–120°C) จะเป่าย้อนกลับเพื่อปล่อย VOC เข้มข้น (การคายซับ) ก๊าซเข้มข้นส่งไปขั้นที่ 4"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#e05c5c;">4</div><div class="stage-text"><h4 data-en="Catalytic Combustion Furnace 🔥" data-th="เตาเผาเร่งปฏิกิริยา 🔥"></h4><p data-en="Destroys: Concentrated VOCs from Stage 3. VOCs combust at 250–400°C using a catalyst (special metal coating) — called flameless combustion. Result: VOCs are converted to harmless CO₂ and water vapour. The heat generated is recycled back to Stage 3 to save energy!" data-th="ทำลาย: VOC เข้มข้นจากขั้นที่ 3 VOC เผาไหม้ที่ 250–400°C โดยใช้ตัวเร่งปฏิกิริยา (การเคลือบโลหะพิเศษ) เรียกว่าการเผาไหม้ไร้เปลวไฟ ผล: VOC ถูกแปลงเป็น CO₂ และไอน้ำที่ไม่เป็นอันตราย ความร้อนถูกนำกลับมาใช้ใหม่ในขั้นที่ 3 เพื่อประหยัดพลังงาน!"></p></div></div>
    </div>
    <div class="info-box" style="border-left-color:#5cb85c;margin-top:14px;">
      <h3 data-en="📊 Performance Numbers" data-th="📊 ตัวเลขประสิทธิภาพ"></h3>
      <ul>
        <li data-en="Total air treated: 60,000 m³/h" data-th="อากาศที่บำบัดรวม: 60,000 ม.³/ชม."></li>
        <li data-en="VOC inlet concentration: ≤300 mg/m³" data-th="ความเข้มข้น VOC ขาเข้า: ≤300 มก./ม.³"></li>
        <li data-en="Purification efficiency: >95%" data-th="ประสิทธิภาพการบำบัด: >95%"></li>
        <li data-en="Catalytic combustion temperature: 250–400°C" data-th="อุณหภูมิการเผาไหม้เร่งปฏิกิริยา: 250–400°C"></li>
        <li data-en="Complies with: Thai & Chinese air quality standards" data-th="เป็นไปตามมาตรฐานคุณภาพอากาศไทยและจีน"></li>
      </ul>
    </div>
  </div>

  <!-- WATER TREATMENT -->
  <div class="section" id="water">
    <div class="info-box">
      <h3 data-en="💧 Two Water Systems in the Factory" data-th="💧 สองระบบน้ำในโรงงาน"></h3>
      <p data-en="The factory has two separate water systems: (A) Pure Water Production — making clean water for washing cups, and (B) Wastewater Treatment — cleaning dirty water from the spray booth and cup washing." data-th="โรงงานมีสองระบบน้ำแยกจากกัน: (A) การผลิตน้ำบริสุทธิ์ — ทำน้ำสะอาดสำหรับล้างแก้ว และ (B) การบำบัดน้ำเสีย — ทำความสะอาดน้ำสกปรกจากบู๊ธพ่นสีและการล้างแก้ว"></p>
    </div>
    <div style="font-size:14px;font-weight:700;margin:14px 0 8px;color:#1a55a0;" data-en="A. Pure Water System — Dual-Stage RO-2000 (2 tonnes/hour)" data-th="A. ระบบน้ำบริสุทธิ์ — RO-2000 สองขั้นตอน (2 ตัน/ชม.)"></div>
    <div class="info-box" style="border-left-color:#3ab5e6;margin-bottom:8px;">
      <p data-en="Tap water has minerals that can stain ceramic cups or affect paint adhesion. The factory purifies water using Reverse Osmosis (RO) membranes — like pushing water through an extremely fine filter that only water molecules can pass through." data-th="น้ำประปามีแร่ธาตุที่อาจทำให้แก้วเซรามิกมีคราบหรือส่งผลต่อการยึดเกาะของสี โรงงานทำน้ำบริสุทธิ์ด้วยเมมเบรน Reverse Osmosis (RO) — เหมือนการผลักน้ำผ่านตัวกรองที่ละเอียดมากที่โมเลกุลน้ำเท่านั้นที่ผ่านได้"></p>
    </div>
    <div class="stage-list">
      <div class="stage-item"><div class="stage-num" style="background:#3ab5e6;">1</div><div class="stage-text"><h4 data-en="Pre-Treatment (3 steps)" data-th="การบำบัดเบื้องต้น (3 ขั้นตอน)"></h4><p data-en="Multi-Media Filter: Quartz sand layers remove large particles. Activated Carbon Filter: Removes chlorine, odours, organic matter (protects RO membranes). Cartridge Filter: Final 5-micron filter before RO." data-th="ตัวกรองหลายชั้น: ทรายควอร์ตซ์กำจัดอนุภาคขนาดใหญ่ ตัวกรองถ่านกัมมันต์: กำจัดคลอรีน กลิ่น สารอินทรีย์ ตัวกรองตลับ: กรอง 5 ไมครอนก่อน RO"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#1a55a0;">2</div><div class="stage-text"><h4 data-en="Stage 1 RO Membrane" data-th="เมมเบรน RO ขั้นที่ 1"></h4><p data-en="Water is pushed through RO membranes at high pressure (pump: 178m head, 4 kW). Membranes block dissolved salts, minerals, and bacteria. A conductivity meter measures water purity." data-th="น้ำถูกผลักผ่านเมมเบรน RO ที่แรงดันสูง (ปั๊ม: หัว 178ม., 4 กิโลวัตต์) เมมเบรนกั้นเกลือที่ละลาย แร่ธาตุ และแบคทีเรีย มิเตอร์ค่านำไฟฟ้าวัดความบริสุทธิ์"></p></div></div>
      <div class="stage-item"><div class="stage-num" style="background:#1a55a0;">3</div><div class="stage-text"><h4 data-en="Stage 2 RO Membrane" data-th="เมมเบรน RO ขั้นที่ 2"></h4><p data-en="Already-purified water passes through a second set of RO membranes for even higher purity. Fully automatic PLC control ensures consistent output quality." data-th="น้ำที่ได้รับการบำบัดแล้วผ่านชุดเมมเบรน RO ชุดที่สองเพื่อความบริสุทธิ์ที่สูงขึ้น ควบคุมด้วย PLC อัตโนมัติเต็มรูปแบบเพื่อคุณภาพผลผลิตที่สม่ำเสมอ"></p></div></div>
    </div>
    <div style="font-size:14px;font-weight:700;margin:18px 0 8px;color:#c0392b;" data-en="B. Wastewater Treatment — Spray Booth Water" data-th="B. การบำบัดน้ำเสีย — น้ำจากบู๊ธพ่นสี"></div>
    <div class="stage-list">

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang) || el.getAttribute('data-en');
  });
  document.getElementById('detail-area').style.display = 'none';
  document.getElementById('kiln-detail').style.display = 'none';
}

function showSection(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function showDetail(key) {
  const d = prodDetails[key];
  if (!d) return;
  const lang = currentLang;
  document.querySelectorAll('.flow-box').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('detail-title').textContent = d[lang].title;
  document.getElementById('detail-body').textContent = d[lang].body;
  document.getElementById('detail-facts').innerHTML = d[lang].facts.map(f => `<span class="fact-chip">${f}</span>`).join('');
  document.getElementById('detail-area').style.display = 'block';
}

function showKiln(key) {
  const d = kilnData[key];
  if (!d) return;
  const lang = currentLang;
  document.getElementById('kiln-title').textContent = d[lang].title;
  document.getElementById('kiln-body').textContent = d[lang].body;
  document.getElementById('kiln-facts').innerHTML = d[lang].facts.map(f => `<span class="fact-chip">${f}</span>`).join('');
  document.getElementById('kiln-detail').style.display = 'block';
}

// Init
document.querySelectorAll('[data-en]').forEach(el => {
  el.textContent = el.getAttribute('data-en');
});
</script>

</html>
